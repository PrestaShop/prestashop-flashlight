version: 0.1
log:
  fields:
    service: registry-mirror

storage:
  cache:
    blobdescriptor: inmemory
  filesystem:
    rootdirectory: /var/lib/registry
  maintenance:
    uploadpurging:
      enabled: true
      age: 168h    # purge incomplete uploads after 7 days
      interval: 24h
      dryrun: false

http:
  addr: :5000
  headers:
    X-Content-Type-Options: [nosniff]

proxy:
  remoteurl: https://registry-1.docker.io

health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 3
